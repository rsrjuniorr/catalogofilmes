<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Catálogo de Filmes</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col items-center p-6">

  <h1 class="text-2xl font-bold mb-4">🎬 Meu Catálogo de Filmes</h1>

  <form id="formFilme" class="bg-white p-4 rounded shadow mb-4 flex flex-col gap-2 w-full max-w-md">
    
    <input id="nome" class="border p-2 rounded" placeholder="Nome do filme" required>

    <input id="nota" type="number" min="1" max="5" class="border p-2 rounded" placeholder="Nota (1 a 5)" required>

    <label class="flex items-center gap-2">
      <input type="checkbox" id="favorito">
      Favorito
    </label>

    <textarea id="critica" class="border p-2 rounded" placeholder="Crítica (opcional)"></textarea>

    <button class="bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
      Salvar
    </button>
  </form>

  <input id="busca" class="border p-2 rounded mb-4 w-full max-w-md" placeholder="Buscar filme...">

  <div id="listaFilmes" class="flex flex-col gap-3 max-w-md"></div>

  <script src="scriptcatalogo.js"></script>

</body>
</html>
